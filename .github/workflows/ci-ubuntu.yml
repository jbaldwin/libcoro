            -   name: install-clang
                run: |
                    wget https://apt.llvm.org/llvm.sh
                    chmod +x llvm.sh
                    sudo ./llvm.sh ${{ matrix.clang_version }}
            -   name: Checkout
                uses: actions/checkout@v4
                with:
